name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore JerjerBlenderBuilderUI/JerjerBlenderBuilderUI.csproj

      - name: Publish
        run: dotnet publish JerjerBlenderBuilderUI/JerjerBlenderBuilderUI.csproj -c Release -o publish

      - name: Build console app
        run: dotnet publish JerjerBlenderBuilder.csproj -c Release -o publish_console

      - name: Package artifacts
        run: |
          7z a -tzip JerjerBlenderBuilderUI.zip .\publish\*
          7z a -tzip JerjerBlenderBuilderConsole.zip .\publish_console\*

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            JerjerBlenderBuilderUI.zip
            JerjerBlenderBuilderConsole.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            JerjerBlenderBuilderUI.zip
            JerjerBlenderBuilderConsole.zip
          generate_release_notes: true
